openapi: 3.0.4
info:
  title: ATS-Mini - OpenAPI 3.0
  description: |-
    ATS-Mini JSON Api definition
  version: 1.0.0
servers:
  - url: http://atsmini.local
  - url: http://10.1.1.1
tags:
  - name: status
    description: Radio status and information
  - name: memory
    description: Memory information
  - name: config
    description: Config information
paths:
  /api/status:
    get:
      tags:
        - status
      summary: Get ATS-Mini status
      operationId: getStatus
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - status
      summary: Set ATS-Mini status
      operationId: setStatus
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdate'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/memory:
    get:
      tags:
        - memory
      summary: Get ATS-Mini memories
      operationId: getMemory
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memory'
                description: Array of memory slots, empty objects for unused slots
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/memory/{memoryIdx}/tune:
    post:
      tags:
        - memory
      summary: Tune to a memory slot
      operationId: tuneToMemory
      parameters:
        - name: memoryIdx
          in: path
          required: true
          description: Memory slot index to tune to
          schema:
            type: integer
            minimum: 0
            maximum: 31
            example: 5
      responses:
        '200':
          description: Successfully tuned to memory slot
        '400':
          description: Invalid memory index or memory slot is empty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/config:
    get:
      tags:
        - config
      summary: Get ATS-Mini configs
      operationId: getConfig
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - config_auth: []
    post:
      tags:
        - config
      summary: Set ATS-Mini configs
      operationId: setConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Config'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '400':
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - config_auth: []

  /api/configOptions:
    get:
      tags:
        - config
      summary: Get ATS-Mini config options
      operationId: getConfigOptions
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigOptions'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Status:
      type: object
      required:
        - ip
        - ssid
        - mac
        - version
        - band
        - freq
        - mode
        - rssi
        - snr
        - battery
        - step
        - bandwidth
        - agc
        - volume
        - softMuteMaxAttIdx
      properties:
        ip:
          type: string
          example: "10.1.1.1"
        ssid:
          type: string
          example: "ATS-Mini"
        mac:
          type: string
          example: "98:A3:16:C1:DA:9C"
        version:
          type: string
          example: "F/W: v2.28d Jul 19 2025"
        band:
          type: string
          example: "VHF"
        freq:
          type: number
          example: 9420
          description: "In kHz"
        mode:
          type: string
          example: "FM"
        rssi:
          type: number
          example: 57
        snr:
          type: number
          example: 35
        battery:
          type: number
          example: 3.69197
        step:
          type: string
          example: "100k"
        bandwidth:
          type: string
          example: "Auto"
        agc:
          type: boolean
          example: false
        attenuation:
          type: number
          example: 10
          description: "Only present when agc off"
        time:
          type: string
          example: "15:49"
          description: "Only present when clock time is available"
        volume:
          type: number
          example: 50
        squelch:
          type: number
          example: 7
          description: "Only present if squelch is enabled"
        softMuteMaxAttIdx:
          type: number
          example: 4
        avc:
          type: number
          example: 10
          description: "Present for SSB and non-FM modes, not present for FM"
        rds:
          type: object
          description: "Only present for FM"
          properties:
            piCode:
              type: string
              example: "5241"
              description: "Hexadecimal string, only present when station code is available"
            stationName:
              type: string
              example: " VIRGIN "
              description: "Only present when station name is available"
            radioText:
              type: string
              example: "In onda MGK con CLICHE'"
              description: "Only present when radio text is available"
            programInfo:
              type: string
              example: "Rock Music"
              description: "Only present when program info is available"

    StatusUpdate:
      type: object
      properties:
        frequency:
          type: number
          example: 9420
          description: "Frequency to set in kHz"
        volume:
          type: number
          minimum: 0
          maximum: 63
          example: 50
          description: "Volume level (0-63)"

    Memory:
      type: object
      properties:
        id:
          type: number
          example: 1
          description: "Memory slot index"
        freq:
          type: number
          example: 9420
          description: "In kHz"
        band:
          type: string
          example: "VHF"
        mode:
          type: string
          example: "FM"
      description: "Empty object for unused memory slots"

    Config:
      type: object
      required:
        - username
        - password
        - wifissid1
        - wifipass1
        - wifissid2
        - wifipass2
        - wifissid3
        - wifipass3
        - brightness
        - calibration
        - utcOffsetIdx
        - rdsModeIdx
        - fmRegionIdx
        - themeIdx
        - uiLayoutIdx
        - zoomMenu
        - scrollDirection
        - sleepModeIdx
        - wifiModeIdx
      properties:
        username:
          type: string
          example: "admin"
        password:
          type: string
          example: "adminpsw"
        wifissid1:
          type: string
          example: "somewifiap"
        wifipass1:
          type: string
          example: "somepwd"
        wifissid2:
          type: string
          example: ""
        wifipass2:
          type: string
          example: ""
        wifissid3:
          type: string
          example: ""
        wifipass3:
          type: string
          example: ""
        brightness:
          type: number
          example: 130
        calibration:
          type: number
          example: 0
        rdsModeIdx:
          type: number
          example: 6
        utcOffsetIdx:
          type: number
          example: 10
        fmRegionIdx:
          type: number
          example: 0
        themeIdx:
          type: number
          example: 5
        uiLayoutIdx:
          type: number
          example: 1
        zoomMenu:
          type: boolean
          example: false
        scrollDirection:
          type: number
          example: 1
          enum: [-1, 1]
          description: "Scroll direction: -1 or 1"
        sleepModeIdx:
          type: number
          example: 0
        wifiModeIdx:
          type: number
          example: 3

    ConfigOptions:
      type: object
      required:
        - rdsModes
        - UTCOffsets
        - fmRegions
        - themes
        - uiLayouts
        - sleepModes
        - wifiModes
      properties:
        rdsModes:
          type: array
          items:
            type: object
            required:
              - id
              - mode
              - desc
            properties:
              id:
                type: number
                example: 3
              mode:
                type: number
                example: 7
              desc:
                type: string
                example: "PS+PI+CT"
        UTCOffsets:
          type: array
          items:
            type: object
            required:
              - id
              - offset
              - desc
              - city
            properties:
              id:
                type: number
                example: 3
              offset:
                type: number
                example: -20
              desc:
                type: string
                example: "UTC-5"
              city:
                type: string
                example: "Houston"
        fmRegions:
          type: array
          items:
            type: object
            required:
              - id
              - value
              - desc
            properties:
              id:
                type: number
                example: 0
              value:
                type: number
                example: 1
              desc:
                type: string
                example: "EU/JP/AU"
        themes:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: number
                example: 1
              name:
                type: string
                example: "Default"
        uiLayouts:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: number
                example: 0
              name:
                type: string
                example: "Default"
        sleepModes:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: number
                example: 0
              name:
                type: string
                example: "Locked"
        wifiModes:
          type: array
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: number
                example: 3
              name:
                type: string
                example: "Connect"

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Invalid JSON"
      required:
        - error

  securitySchemes:
    config_auth:
      type: http
      scheme: basic
